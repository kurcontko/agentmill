x-agent-base: &agent-base
  image: ${AGENTMILL_IMAGE:-agentmill:latest}
  build: .
  runtime: io.containerd.runc.v2
  restart: unless-stopped
  security_opt: [no-new-privileges:true]
  cap_drop: [ALL]
  mem_limit: 4g
  pids_limit: 256
  read_only: ${AGENTMILL_READ_ONLY_ROOTFS:-true}
  tmpfs:
  - /tmp:rw,nosuid,nodev,mode=1777
  - /home/agent:rw,nosuid,nodev,uid=1000,gid=1000,mode=700
  - /workspace:rw,nosuid,nodev,uid=1000,gid=1000,mode=755

x-headless-env: &headless-env
  <<: *common-env
  PROMPT_FILE: ${PROMPT_FILE:-/prompts/PROMPT.md}
  MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
  LOOP_DELAY: ${LOOP_DELAY:-5}

x-multi-agent-env: &multi-agent-env
  <<: *common-env
  AGENT_BRANCH: ${AGENT_BRANCH:-}
  MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
  LOOP_DELAY: ${LOOP_DELAY:-5}

x-repo-volumes: &repo-volumes
  - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/repo
  - ./prompts:/prompts
  - ./hooks:/hooks:ro
  - ./logs:/workspace/logs
  - ./memory:/workspace/memory
  - ~/.claude.json:/home/agent/.host-claude.json:ro
  - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
  - ~/.claude/plugins:/home/agent/.host-plugins:ro
  - ~/.claude/commands:/home/agent/.host-commands:ro
  - ~/.claude/skills:/home/agent/.host-skills:ro
  - ~/.claude/agents:/home/agent/.host-agents:ro
  - ~/.codex:/home/agent/.host-codex:ro

x-upstream-volumes: &upstream-volumes
  - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/upstream
  - ./prompts:/prompts
  - ./hooks:/hooks:ro
  - ./logs:/workspace/logs
  - ./memory:/workspace/memory
  - ~/.claude.json:/home/agent/.host-claude.json:ro
  - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
  - ~/.claude/plugins:/home/agent/.host-plugins:ro
  - ~/.claude/commands:/home/agent/.host-commands:ro
  - ~/.claude/skills:/home/agent/.host-skills:ro
  - ~/.claude/agents:/home/agent/.host-agents:ro
  - ~/.codex:/home/agent/.host-codex:ro

x-upstream-ro-volumes: &upstream-ro-volumes
  - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/upstream:ro
  - ./prompts:/prompts
  - ./hooks:/hooks:ro
  - ./logs:/workspace/logs
  - ./memory:/workspace/memory
  - ~/.claude.json:/home/agent/.host-claude.json:ro
  - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
  - ~/.claude/plugins:/home/agent/.host-plugins:ro
  - ~/.claude/commands:/home/agent/.host-commands:ro
  - ~/.claude/skills:/home/agent/.host-skills:ro
  - ~/.claude/agents:/home/agent/.host-agents:ro
  - ~/.codex:/home/agent/.host-codex:ro

x-tui-base: &tui-base
  <<: *agent-base
  entrypoint: ["/entrypoint-tui.sh"]
  tty: true
  stdin_open: true
  restart: "no"

services:
  headless:
    <<: *agent-base
    environment:
      <<: *headless-env
      AGENT_ID: "1"
    volumes: *repo-volumes

  headless-clone:
    <<: *agent-base
    environment:
      <<: *headless-env
      AGENT_ID: "1"
      AGENTMILL_WORKSPACE_MODE: "readonly-clone"
    volumes: *upstream-ro-volumes

  agent-1:
    <<: *agent-base
    environment:
      <<: *multi-agent-env
      AGENT_ID: "1"
      PROMPT_FILE: ${PROMPT_FILE_1:-/prompts/PROMPT.md}
    volumes: *upstream-volumes

  agent-2:
    <<: *agent-base
    environment:
      <<: *multi-agent-env
      AGENT_ID: "2"
      PROMPT_FILE: ${PROMPT_FILE_2:-/prompts/PROMPT.md}
    volumes: *upstream-volumes

  agent-3:
    <<: *agent-base
    environment:
      <<: *multi-agent-env
      AGENT_ID: "3"
      PROMPT_FILE: ${PROMPT_FILE_3:-/prompts/PROMPT.md}
    volumes: *upstream-volumes

  watch:
    <<: *tui-base
    environment:
      <<: *common-env
      PROMPT_FILE: ${PROMPT_FILE:-/prompts/PROMPT.md}
      AUTO_RALPH: ${AUTO_RALPH:-false}
      RESPAWN: ${RESPAWN:-false}
      LOOP_DELAY: ${LOOP_DELAY:-5}
    volumes: *repo-volumes

  watch-clone:
    <<: *tui-base
    environment:
      <<: *common-env
      AGENTMILL_WORKSPACE_MODE: "readonly-clone"
      PROMPT_FILE: ${PROMPT_FILE:-/prompts/PROMPT.md}
      AUTO_RALPH: ${AUTO_RALPH:-false}
      RESPAWN: ${RESPAWN:-false}
      LOOP_DELAY: ${LOOP_DELAY:-5}
    volumes: *upstream-ro-volumes

  interactive:
    <<: *tui-base
    environment:
      <<: *common-env
      AUTO_RALPH: "false"
      RESPAWN: "false"
      SKIP_PROMPT: "true"
    volumes: *repo-volumes

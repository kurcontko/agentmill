x-common-env: &common-env
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  MODEL: ${MODEL:-sonnet}
  CODEX_MODEL: ${CODEX_MODEL:-}
  GIT_USER: ${GIT_USER:-agentmill}
  GIT_EMAIL: ${GIT_EMAIL:-agent@agentmill}
  AUTO_SETUP: ${AUTO_SETUP:-true}
  REPO_SETUP_COMMAND: ${REPO_SETUP_COMMAND:-}
  EXTRA_PYTHON_TOOLS: ${EXTRA_PYTHON_TOOLS:-}
  AUTO_RALPH_MAX_ITERATIONS: ${AUTO_RALPH_MAX_ITERATIONS:-10}
  AUTO_RALPH_COMPLETION_PROMISE: ${AUTO_RALPH_COMPLETION_PROMISE:-TASK_COMPLETE}

x-agent-base: &agent-base
  build: .
  restart: unless-stopped
  volumes: &shared-volumes
    - ./prompts:/prompts
    - ./logs:/workspace/logs
    - ~/.claude.json:/home/agent/.host-claude.json:ro
    - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
    - ~/.claude/plugins:/home/agent/.host-plugins:ro
    - ~/.claude/commands:/home/agent/.claude/commands:ro

services:
# --- Single agent (default) -----------------------------------
# Mounts repo directly. Simple, no sync overhead.
# Usage: docker compose up agent
  agent:
    <<: *agent-base
    environment:
      <<: *common-env
      AGENT_ID: "1"
      MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
      LOOP_DELAY: ${LOOP_DELAY:-5}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/repo
      - ~/.claude.json:/home/agent/.host-claude.json:ro
      - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
      - ~/.claude/plugins:/home/agent/.host-plugins:ro
      - ~/.claude/commands:/home/agent/.claude/commands:ro

# --- Multi-agent: independent clones --------------------------
# Mounts repo as upstream. Each agent clones into its own
# workspace and syncs via git push/pull. No race conditions.
#
# Usage:
#   docker compose up agent-1 agent-2 agent-3
#
# Different prompts/roles per agent:
#   PROMPT_FILE_1=/prompts/core.md PROMPT_FILE_2=/prompts/tests.md \
#     docker compose up agent-1 agent-2
#
# All agents on same branch (they'll rebase on conflict):
#   AGENT_BRANCH=main docker compose up agent-1 agent-2
  agent-1:
    <<: *agent-base
    environment:
      <<: *common-env
      AGENT_ID: "1"
      AGENT_BRANCH: ${AGENT_BRANCH:-}
      MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
      LOOP_DELAY: ${LOOP_DELAY:-5}
      PROMPT_FILE: ${PROMPT_FILE_1:-/prompts/PROMPT.md}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/upstream
      - ~/.claude.json:/home/agent/.host-claude.json:ro
      - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
      - ~/.claude/plugins:/home/agent/.host-plugins:ro
      - ~/.claude/commands:/home/agent/.claude/commands:ro

  agent-2:
    <<: *agent-base
    environment:
      <<: *common-env
      AGENT_ID: "2"
      AGENT_BRANCH: ${AGENT_BRANCH:-}
      MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
      LOOP_DELAY: ${LOOP_DELAY:-5}
      PROMPT_FILE: ${PROMPT_FILE_2:-/prompts/PROMPT.md}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/upstream
      - ~/.claude.json:/home/agent/.host-claude.json:ro
      - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
      - ~/.claude/plugins:/home/agent/.host-plugins:ro
      - ~/.claude/commands:/home/agent/.claude/commands:ro

  agent-3:
    <<: *agent-base
    environment:
      <<: *common-env
      AGENT_ID: "3"
      AGENT_BRANCH: ${AGENT_BRANCH:-}
      MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
      LOOP_DELAY: ${LOOP_DELAY:-5}
      PROMPT_FILE: ${PROMPT_FILE_3:-/prompts/PROMPT.md}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/upstream
      - ~/.claude.json:/home/agent/.host-claude.json:ro
      - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
      - ~/.claude/plugins:/home/agent/.host-plugins:ro
      - ~/.claude/commands:/home/agent/.claude/commands:ro

# --- TUI dashboard --------------------------------------------
# Forwards Claude Code's interactive UI to your terminal.
# Usage: docker compose run dashboard
  dashboard:
    <<: *agent-base
    entrypoint: ["/entrypoint-tui.sh"]
    tty: true
    stdin_open: true
    restart: "no"
    environment:
      <<: *common-env
      AUTO_RALPH: ${AUTO_RALPH:-false}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/repo
      - ~/.claude.json:/home/agent/.host-claude.json:ro
      - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
      - ~/.claude/plugins:/home/agent/.host-plugins:ro
      - ~/.claude/commands:/home/agent/.claude/commands:ro

# --- Codex dashboard ------------------------------------------
# Interactive OpenAI Codex session in the repo root.
# Usage: docker compose run codex-dashboard
  codex-dashboard:
    build: .
    entrypoint: ["/entrypoint-codex-tui.sh"]
    tty: true
    stdin_open: true
    restart: "no"
    environment:
      <<: *common-env
      CODEX_APPROVAL_MODE: ${CODEX_APPROVAL_MODE:-suggest}
      PROMPT_FILE: ${PROMPT_FILE:-/prompts/PROMPT.md}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/repo
      - ~/.codex:/home/agent/.codex

# --- Codex agent ----------------------------------------------
# Headless Codex loop using codex exec --full-auto.
# Usage: docker compose up codex-agent
  codex-agent:
    build: .
    entrypoint: ["/entrypoint-codex.sh"]
    restart: unless-stopped
    environment:
      <<: *common-env
      AGENT_ID: "1"
      MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
      LOOP_DELAY: ${LOOP_DELAY:-5}
      PROMPT_FILE: ${PROMPT_FILE:-/prompts/PROMPT.md}
      CODEX_JSON: ${CODEX_JSON:-false}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/repo
      - ~/.codex:/home/agent/.codex

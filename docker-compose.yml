x-common-env: &common-env
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
  MODEL: ${MODEL:-sonnet}
  GIT_USER: ${GIT_USER:-agentmill}
  GIT_EMAIL: ${GIT_EMAIL:-agent@agentmill}
  AUTO_SETUP: ${AUTO_SETUP:-true}
  REPO_SETUP_COMMAND: ${REPO_SETUP_COMMAND:-}
  EXTRA_PYTHON_TOOLS: ${EXTRA_PYTHON_TOOLS:-}
  AUTO_RALPH_MAX_ITERATIONS: ${AUTO_RALPH_MAX_ITERATIONS:-10}
  AUTO_RALPH_COMPLETION_PROMISE: ${AUTO_RALPH_COMPLETION_PROMISE:-TASK_COMPLETE}
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
  DISABLE_COST_WARNINGS: "1"
  GIT_TERMINAL_PROMPT: "0"
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}
  NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS:-}

x-agent-base: &agent-base
  build: .
  restart: unless-stopped
  security_opt: [no-new-privileges:true]
  cap_drop: [ALL]
  mem_limit: 4g
  pids_limit: 256

x-headless-env: &headless-env
  <<: *common-env
  MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
  LOOP_DELAY: ${LOOP_DELAY:-5}

x-multi-agent-env: &multi-agent-env
  <<: *common-env
  AGENT_BRANCH: ${AGENT_BRANCH:-}
  MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
  LOOP_DELAY: ${LOOP_DELAY:-5}

x-repo-volumes: &repo-volumes
  - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/repo
  - ./prompts:/prompts
  - ./logs:/workspace/logs
  - ./memory:/workspace/memory
  - ~/.claude.json:/home/agent/.host-claude.json:ro
  - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
  - ~/.claude/plugins:/home/agent/.host-plugins:ro
  - ~/.claude/commands:/home/agent/.claude/commands:ro
  - ~/.claude/skills:/home/agent/.host-skills:ro
  - ~/.claude/agents:/home/agent/.host-agents:ro

x-upstream-volumes: &upstream-volumes
  - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/upstream
  - ./prompts:/prompts
  - ./logs:/workspace/logs
  - ./memory:/workspace/memory
  - ~/.claude.json:/home/agent/.host-claude.json:ro
  - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
  - ~/.claude/plugins:/home/agent/.host-plugins:ro
  - ~/.claude/commands:/home/agent/.claude/commands:ro
  - ~/.claude/skills:/home/agent/.host-skills:ro
  - ~/.claude/agents:/home/agent/.host-agents:ro

x-tui-base: &tui-base
  <<: *agent-base
  entrypoint: ["/entrypoint-tui.sh"]
  tty: true
  stdin_open: true
  restart: "no"

services:
  headless:
    <<: *agent-base
    environment:
      <<: *headless-env
      AGENT_ID: "1"
    volumes: *repo-volumes

  agent-1:
    <<: *agent-base
    environment:
      <<: *multi-agent-env
      AGENT_ID: "1"
      PROMPT_FILE: ${PROMPT_FILE_1:-/prompts/PROMPT.md}
    volumes: *upstream-volumes

  agent-2:
    <<: *agent-base
    environment:
      <<: *multi-agent-env
      AGENT_ID: "2"
      PROMPT_FILE: ${PROMPT_FILE_2:-/prompts/PROMPT.md}
    volumes: *upstream-volumes

  agent-3:
    <<: *agent-base
    environment:
      <<: *multi-agent-env
      AGENT_ID: "3"
      PROMPT_FILE: ${PROMPT_FILE_3:-/prompts/PROMPT.md}
    volumes: *upstream-volumes

  watch:
    <<: *tui-base
    environment:
      <<: *common-env
      PROMPT_FILE: ${PROMPT_FILE:-/prompts/PROMPT.md}
      AUTO_RALPH: ${AUTO_RALPH:-false}
      RESPAWN: ${RESPAWN:-false}
      LOOP_DELAY: ${LOOP_DELAY:-5}
    volumes: *repo-volumes

  interactive:
    <<: *tui-base
    environment:
      <<: *common-env
      AUTO_RALPH: "false"
      RESPAWN: "false"
      SKIP_PROMPT: "true"
    volumes: *repo-volumes

x-common-env: &common-env
  AGENT_CLI: ${AGENT_CLI:-claude}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  LOCAL_ENDPOINT: ${LOCAL_ENDPOINT:-}
  LOCAL_API_KEY: ${LOCAL_API_KEY:-}
  OPENCODE_EXTRA_CONFIG: ${OPENCODE_EXTRA_CONFIG:-}
  MODEL: ${MODEL:-sonnet}
  GIT_USER: ${GIT_USER:-agentmill}
  GIT_EMAIL: ${GIT_EMAIL:-agent@agentmill}
  AUTO_SETUP: ${AUTO_SETUP:-true}
  REPO_SETUP_COMMAND: ${REPO_SETUP_COMMAND:-}
  EXTRA_PYTHON_TOOLS: ${EXTRA_PYTHON_TOOLS:-}
  AUTO_RALPH_MAX_ITERATIONS: ${AUTO_RALPH_MAX_ITERATIONS:-10}
  AUTO_RALPH_COMPLETION_PROMISE: ${AUTO_RALPH_COMPLETION_PROMISE:-TASK_COMPLETE}

x-agent-base: &agent-base
  build: .
  restart: unless-stopped
  volumes: &shared-volumes
    - ./prompts:/prompts
    - ./logs:/workspace/logs
    - ~/.claude.json:/home/agent/.host-claude.json:ro
    - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
    - ~/.claude/plugins:/home/agent/.host-plugins:ro
    - ~/.claude/commands:/home/agent/.claude/commands:ro

services:
# --- Single agent (default) -----------------------------------
# Mounts repo directly. Simple, no sync overhead.
# Usage: docker compose up agent
  agent:
    <<: *agent-base
    environment:
      <<: *common-env
      AGENT_ID: "1"
      MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
      LOOP_DELAY: ${LOOP_DELAY:-5}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/repo
      - ~/.claude.json:/home/agent/.host-claude.json:ro
      - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
      - ~/.claude/plugins:/home/agent/.host-plugins:ro
      - ~/.claude/commands:/home/agent/.claude/commands:ro

# --- Multi-agent: independent clones --------------------------
# Mounts repo as upstream. Each agent clones into its own
# workspace and syncs via git push/pull. No race conditions.
#
# Usage:
#   docker compose up agent-1 agent-2 agent-3
#
# Different prompts/roles per agent:
#   PROMPT_FILE_1=/prompts/roles/architect.md \
#   PROMPT_FILE_2=/prompts/roles/implementer.md \
#   PROMPT_FILE_3=/prompts/roles/tester.md \
#     docker compose up agent-1 agent-2 agent-3
#
# All agents on same branch (they'll rebase on conflict):
#   AGENT_BRANCH=main docker compose up agent-1 agent-2
  agent-1:
    <<: *agent-base
    environment:
      <<: *common-env
      AGENT_ID: "1"
      AGENT_BRANCH: ${AGENT_BRANCH:-}
      MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
      LOOP_DELAY: ${LOOP_DELAY:-5}
      PROMPT_FILE: ${PROMPT_FILE_1:-/prompts/PROMPT.md}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/upstream
      - ~/.claude.json:/home/agent/.host-claude.json:ro
      - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
      - ~/.claude/plugins:/home/agent/.host-plugins:ro
      - ~/.claude/commands:/home/agent/.claude/commands:ro

  agent-2:
    <<: *agent-base
    environment:
      <<: *common-env
      AGENT_ID: "2"
      AGENT_BRANCH: ${AGENT_BRANCH:-}
      MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
      LOOP_DELAY: ${LOOP_DELAY:-5}
      PROMPT_FILE: ${PROMPT_FILE_2:-/prompts/PROMPT.md}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/upstream
      - ~/.claude.json:/home/agent/.host-claude.json:ro
      - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
      - ~/.claude/plugins:/home/agent/.host-plugins:ro
      - ~/.claude/commands:/home/agent/.claude/commands:ro

  agent-3:
    <<: *agent-base
    environment:
      <<: *common-env
      AGENT_ID: "3"
      AGENT_BRANCH: ${AGENT_BRANCH:-}
      MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
      LOOP_DELAY: ${LOOP_DELAY:-5}
      PROMPT_FILE: ${PROMPT_FILE_3:-/prompts/PROMPT.md}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/upstream
      - ~/.claude.json:/home/agent/.host-claude.json:ro
      - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
      - ~/.claude/plugins:/home/agent/.host-plugins:ro
      - ~/.claude/commands:/home/agent/.claude/commands:ro

# --- TUI dashboard --------------------------------------------
# Forwards Claude Code's interactive UI to your terminal.
# Usage: docker compose run dashboard
  dashboard:
    <<: *agent-base
    entrypoint: ["/entrypoint-tui.sh"]
    tty: true
    stdin_open: true
    restart: "no"
    environment:
      <<: *common-env
      PROMPT_FILE: ${PROMPT_FILE:-/prompts/PROMPT.md}
      AUTO_RALPH: ${AUTO_RALPH:-false}
      RESPAWN: ${RESPAWN:-false}
      LOOP_DELAY: ${LOOP_DELAY:-5}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/repo
      - ~/.claude.json:/home/agent/.host-claude.json:ro
      - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
      - ~/.claude/plugins:/home/agent/.host-plugins:ro
      - ~/.claude/commands:/home/agent/.claude/commands:ro

# --- TUI manual -----------------------------------------------
# Plain Claude TUI for manual interactive work. No ralph-loop.
# Usage: docker compose run tui
  tui:
    <<: *agent-base
    entrypoint: ["/entrypoint-tui.sh"]
    tty: true
    stdin_open: true
    restart: "no"
    environment:
      <<: *common-env
      AUTO_RALPH: "false"
      RESPAWN: "false"
      SKIP_PROMPT: "true"
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/repo
      - ~/.claude.json:/home/agent/.host-claude.json:ro
      - ~/.claude/settings.json:/home/agent/.claude/settings.host.json:ro
      - ~/.claude/plugins:/home/agent/.host-plugins:ro
      - ~/.claude/commands:/home/agent/.claude/commands:ro

# --- OpenCode: local model agent --------------------------------
# Runs OpenCode with a local vLLM/llama.cpp endpoint.
# Usage:
#   LOCAL_ENDPOINT=http://host.docker.internal:30000/v1 \
#   MODEL=openai-compatible/nemotron \
#     docker compose up agent-local
  agent-local:
    <<: *agent-base
    environment:
      <<: *common-env
      AGENT_CLI: opencode
      LOCAL_ENDPOINT: ${LOCAL_ENDPOINT:-http://host.docker.internal:30000/v1}
      LOCAL_API_KEY: ${LOCAL_API_KEY:-dummy}
      MODEL: ${MODEL:-openai-compatible/nemotron}
      AGENT_ID: "1"
      MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
      LOOP_DELAY: ${LOOP_DELAY:-5}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/repo

# --- OpenCode: API model agent ----------------------------------
# Runs OpenCode with a cloud provider (Anthropic, OpenAI, etc.)
# Usage:
#   MODEL=anthropic/claude-sonnet-4 docker compose up agent-opencode
  agent-opencode:
    <<: *agent-base
    environment:
      <<: *common-env
      AGENT_CLI: opencode
      AGENT_ID: "1"
      MAX_ITERATIONS: ${MAX_ITERATIONS:-0}
      LOOP_DELAY: ${LOOP_DELAY:-5}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ${REPO_PATH:?Set REPO_PATH in .env}:/workspace/repo
      - ~/.claude.json:/home/agent/.host-claude.json:ro

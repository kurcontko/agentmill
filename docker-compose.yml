services:
  agent:
    build: .
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - REPO_URL=${REPO_URL:-}
      - MODEL=${MODEL:-sonnet}
      - MAX_ITERATIONS=${MAX_ITERATIONS:-0}
      - LOOP_DELAY=${LOOP_DELAY:-5}
      - GIT_USER=${GIT_USER:-agentmill}
      - GIT_EMAIL=${GIT_EMAIL:-agent@agentmill}
    volumes:
      - ./prompts:/prompts
      - ./logs:/workspace/logs
      - ./repo:/upstream          # optional: mount a local repo
      - ~/.claude:/root/.claude   # optional: mount subscription auth
    restart: unless-stopped

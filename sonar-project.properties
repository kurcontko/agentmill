sonar.organization=kurcontko
sonar.projectKey=kurcontko_agentmill

sonar.sources=.
sonar.inclusions=**/*.sh,**/*.py,**/*.yml,**/*.yaml,Dockerfile
sonar.exclusions=**/node_modules/**,**/logs/**,**/.git/**,**/repo/**

sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# Security hotspot exclusions — these files intentionally execute shell commands
# and make HTTP requests as their core purpose (agent tool executor).
sonar.security.hotspots.exclusions=thin_runner.py,entrypoint.sh,entrypoint-tui.sh,setup-repo-env.sh,setup-claude-config.sh,tests/**

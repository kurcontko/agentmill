description = "Memory curator for durable decisions, blockers, and reusable patterns."
prompt_file = "/prompts/PROMPT_MEMORY.md"
model = "sonnet"
branch_pattern = "memory-{agent_id}"
max_iterations = 5
loop_delay = 5
max_wall_seconds = 3600
max_log_bytes = 52428800
profile_level = "standard"
auto_commit_mode = "wip"
completion_gate = "done_file"
network = "deny"
mcp_allowlist = []
skill_allowlist = []
forward_host_mcp = false

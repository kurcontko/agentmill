name: CI

on:
  push:
    branches: [main, "split/**"]
  pull_request:
    branches: [main, "split/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: "."
          format: gcc
          severity: warning
          additional_files: ""
          check_together: "yes"

  hadolint:
    name: Hadolint (Dockerfile)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Compile Python sources
        run: python3 -m compileall -q tests

      - name: Run Python unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

  shell-tests:
    name: Shell Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run shell test suite
        run: |
          set -euo pipefail
          mapfile -t test_scripts < <(find tests -maxdepth 1 -type f -name 'test_*.sh' | sort)
          for test_script in "${test_scripts[@]}"; do
            if [[ "$test_script" == "tests/test_smoke_integration.sh" ]]; then
              continue
            fi
            echo "::group::$test_script"
            bash "$test_script"
            echo "::endgroup::"
          done

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [shellcheck, hadolint, python-tests, shell-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          tags: agentmill:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
